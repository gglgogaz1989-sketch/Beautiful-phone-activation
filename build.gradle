// В ЭТОМ ФАЙЛЕ ТЕПЕРЬ НЕ ДОЛЖНО БЫТЬ БЛОКОВ repositories { ... }
buildscript {
    dependencies {
        // Версия плагина (должна совпадать с твоей версией Android Studio)
        classpath "com.android.tools.build:gradle:8.2.2"
    }
}

// Эта задача просто чистит папку сборки
task clean(type: Delete) {
    delete rootProject.buildDir
}
